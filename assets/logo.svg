<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <linearGradient id="chrome-text" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E2E8F0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CBD5E0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="#000000"/>
  
  <circle cx="200" cy="160" r="85" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.2"/>
  
  <line x1="120" x2="280" y1="160" y2="160" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  
  <g filter="url(#neon-glow)">
    <path d="M140 190 L165 175 L185 185 L200 160" fill="none" stroke="#00FFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="145" y="150" font-family="Arial, sans-serif" font-weight="900" font-size="24" fill="#00FFFF">K</text>
  </g>
  
  <g filter="url(#neon-glow)">
    <path d="M200 160 L215 135 L240 155 L265 120" fill="none" stroke="#FF00FF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="235" y="190" font-family="Arial, sans-serif" font-weight="900" font-size="24" fill="#FF00FF">P</text>
  </g>
  
  <g filter="url(#neon-glow)">
    <path d="M200 160 L200 85 M192 95 L200 85 L208 95" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <text x="200" y="315" font-family="Verdana, Geneva, sans-serif" font-weight="bold" font-size="56" text-anchor="middle" fill="url(#chrome-text)" letter-spacing="4">EQUINOX</text>
  
  <text x="200" y="350" font-family="Verdana, Geneva, sans-serif" font-weight="bold" font-size="11" text-anchor="middle" fill="#00FFFF" opacity="0.9" letter-spacing="5">PREDICTION MARKET ANALYSIS</text>
</svg>